<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packages - Apni Holidays</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="manifest" href="manifest.json" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('SW registration failed', err));
    }
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">Apni Holidays</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="packages.html">Packages</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Packages Section -->
  <section class="packages">
    <div class="container">
      <h1>Our Holiday Packages</h1>
      <div class="package-list" id="package-list">
        <!-- Packages will be loaded here from JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2025 Apni Holidays. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    // Highlight active nav link
    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.href === window.location.href || window.location.href.includes(link.getAttribute('href'))) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
