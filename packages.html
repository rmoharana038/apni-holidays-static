  <!-- Open Graph -->
  <meta property="og:title" content="Packages - Apni Holidays" />

  <!-- Favicon & Manifest -->
  <link rel="icon" href="assets/favicon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Preconnects -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('SW registration failed', err));
    }
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">Apni Holidays</a>
      <div class="hamburger" id="hamburger">&#9776;</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="packages.html">Packages</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Packages Section -->
  <section class="packages" data-aos="fade-up">
    <div class="container">
      <h1>Our Holiday Packages</h1>
      <div class="package-list" id="package-list">
        <!-- Packages will be loaded here from JS -->
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2025 Apni Holidays. All rights reserved.</p>
    </div>
  </footer>

  <!-- Back to Top Button -->
  <button id="backToTop" title="Back to Top">↑</button>

  <!-- Scripts -->
  <script src="script.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" defer></script>
  <script>
    AOS.init();
    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.href === window.location.href || window.location.href.includes(link.getAttribute('href'))) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
