<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apni Holidays | Explore Your Next Adventure</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="assets/favicon.png" />
  <link rel="manifest" href="manifest.json" />
  <!-- AOS Scroll Animation CSS -->
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('SW registration failed', err));
    }
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">Apni Holidays</a>
      <div class="hamburger" id="hamburger">&#9776;</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="packages.html">Packages</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" data-aos="fade-up">
    <div class="hero-content">
      <h1>Explore Your Next Adventure</h1>
      <p>Discover beautiful destinations with Apni Holidays. Book your dream vacation now!</p>
      <a href="packages.html" class="btn-primary">View Packages</a>
    </div>
  </section>

  <!-- Contact Section -->
  <section class="contact" id="contact" data-aos="fade-up">
    <div class="container">
      <h2>Contact Us</h2>
      <p>Email: contact@apniholidays.com</p>
      <p>Phone: +91-9876543210</p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2025 Apni Holidays. All rights reserved.</p>
    </div>
  </footer>

  <!-- Back to Top Button -->
  <button id="backToTop" title="Back to Top">↑</button>

  <!-- Scripts -->
  <script src="script.js"></script>
  <!-- AOS JS -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init();
    // Highlight active nav link
    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.href === window.location.href || window.location.href.includes(link.getAttribute('href'))) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
