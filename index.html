<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apni Holidays | Explore Your Next Adventure</title>
  <meta name="description" content="Book your next vacation with Apni Holidays. Discover affordable and exciting holiday packages across India.">
  <meta name="keywords" content="holiday packages, travel India, vacation, Apni Holidays, tours, adventure trips, beach holidays">
  <meta name="author" content="Apni Holidays Team" />
  <link rel="canonical" href="https://rmoharana038.github.io/apni-holidays/" />

  <!-- Open Graph -->
  <meta property="og:title" content="Apni Holidays | Explore Your Next Adventure" />
  <meta property="og:description" content="Explore top destinations and affordable packages with Apni Holidays." />
  <meta property="og:image" content="assets/hero.jpg" />
  <meta property="og:url" content="https://rmoharana038.github.io/apni-holidays/" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Apni Holidays | Explore Your Next Adventure" />
  <meta name="twitter:description" content="Explore top destinations and affordable packages with Apni Holidays." />
  <meta name="twitter:image" content="assets/hero.jpg" />

  <!-- Favicon & Manifest -->
  <link rel="icon" href="assets/favicon.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Preconnects -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

  <!-- Styles & AOS -->
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet" />

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('SW registration failed', err));
    }
  </script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo">Apni Holidays</a>
      <div class="hamburger" id="hamburger">&#9776;</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="packages.html">Packages</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" data-aos="fade-up">
    <div class="hero-content">
      <h1>Explore Your Next Adventure</h1>
      <p>Discover beautiful destinations with Apni Holidays. Book your dream vacation now!</p>
      <a href="packages.html" class="btn-primary">View Packages</a>
    </div>
  </section>

  <!-- Contact Section with Form -->
  <section class="contact" id="contact" data-aos="fade-up">
    <div class="container">
      <h2>Contact Us</h2>
      <form action="https://formspree.io/f/mnnzqwjl" method="POST" class="contact-form">
        <input type="text" name="name" placeholder="Your Name" required />
        <input type="email" name="_replyto" placeholder="Your Email" required />
        <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn-primary">Send Message</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>© 2025 Apni Holidays. All rights reserved.</p>
    </div>
  </footer>

  <!-- Back to Top Button -->
  <button id="backToTop" title="Back to Top">↑</button>

  <!-- JS Scripts -->
  <script src="script.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js" defer></script>
  <script>
    AOS.init();

    document.querySelectorAll('.nav-links a').forEach(link => {
      if (link.href === window.location.href || window.location.href.includes(link.getAttribute('href'))) {
        link.classList.add('active');
      }
    });
  </script>
</body>
</html>
